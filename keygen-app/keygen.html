<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>授权注册机</title>
<style>
  :root{--bg:#10131a;--panel:#171b24;--line:#2a3140;--fg:#e6e9ef;--mut:#9aa3b2;--acc:#10a37f}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);font:14px/1.5 -apple-system,system-ui,"PingFang SC",sans-serif;padding:18px}
  h1{font-size:17px;margin:0 0 2px}
  .sub{color:var(--mut);font-size:12px;margin-bottom:14px}
  .key{font-size:12px;padding:8px 10px;border-radius:8px;border:1px solid var(--line);background:#23272f;margin-bottom:14px;display:flex;align-items:center;gap:8px;justify-content:space-between}
  .ok{color:#34c759}.bad{color:#ff453a}
  label{font-size:12px;color:var(--mut);display:block;margin:10px 0 4px}
  input{width:100%;background:#23272f;color:var(--fg);border:1px solid var(--line);border-radius:8px;padding:9px 10px;font-size:13px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  button{background:var(--acc);color:#fff;border:0;border-radius:8px;padding:10px 16px;font-size:13px;cursor:pointer}
  button.sec{background:#23272f;border:1px solid var(--line);color:var(--fg);padding:5px 10px;font-size:12px}
  button:hover{filter:brightness(1.08)}
  .out{margin-top:16px;background:#23272f;border:1px solid var(--line);border-radius:8px;padding:12px;display:none}
  .out.show{display:block}
  .cdk{font:12px/1.4 ui-monospace,Menlo,monospace;word-break:break-all;background:#10131a;border:1px solid var(--line);border-radius:6px;padding:10px;margin:8px 0}
  .meta{font-size:12px;color:var(--mut)}
  #msg{font-size:12px;margin-top:8px;min-height:16px}
</style>
</head>
<body>
  <h1>授权注册机</h1>
  <div class="sub">⚠️ 仅供作者本地使用。本程序需 private.pem 私钥，请勿外发。</div>

  <div class="key">
    <span id="keyState">检查私钥中…</span>
    <button class="sec" id="pickKey">选择私钥</button>
  </div>

  <div class="grid">
    <div><label>有效期（天，留空=永久）</label><input id="days" type="number" min="1" placeholder="如 30 / 365"></div>
    <div><label>绑定机器码（必填）</label><input id="machine" placeholder="客户提供的机器码"></div>
  </div>
  <label>备注（可选）</label>
  <input id="note" placeholder="如：客户张三">

  <div style="margin-top:16px"><button id="gen">生成 CDK</button></div>
  <div id="msg"></div>

  <div class="out" id="out">
    <div class="meta" id="meta"></div>
    <div class="cdk" id="cdk"></div>
    <button class="sec" id="copy">复制 CDK</button>
  </div>

  <script>
    const $ = s => document.querySelector(s);
    async function refreshKey(){
      const r = await window.kg.keyStatus();
      $("#keyState").innerHTML = r.found
        ? (r.integrated ? '<span class="ok">✓ 私钥已内置（整体版）</span>' : '<span class="ok">✓ 已加载私钥</span> <span style="color:#9aa3b2;font-size:11px">'+r.path+'</span>')
        : '<span class="bad">✗ 未找到私钥</span>';
      $("#pickKey").style.display = r.integrated ? "none" : "";
    }
    refreshKey();
    $("#pickKey").onclick = async () => { await window.kg.pickKey(); refreshKey(); };
    $("#gen").onclick = async () => {
      if (!$("#machine").value.trim()) { $("#msg").innerHTML = '<span class="bad">机器码必填（已强制绑定）</span>'; return; }
      $("#msg").textContent = "生成中…";
      const opts = { days: $("#days").value || "", machine: $("#machine").value || "", note: $("#note").value || "" };
      const r = await window.kg.genCDK(opts);
      if (!r.ok) { $("#msg").innerHTML = '<span class="bad">'+r.reason+'</span>'; $("#out").classList.remove("show"); return; }
      $("#msg").textContent = "";
      $("#meta").textContent = "有效期：" + (r.exp ? new Date(r.exp).toLocaleString() : "永久")
        + " · 机器：" + (r.machine || "不绑定") + " · 备注：" + (r.note || "-");
      $("#cdk").textContent = r.cdk;
      $("#out").classList.add("show");
    };
    $("#copy").onclick = () => navigator.clipboard.writeText($("#cdk").textContent);
  </script>
</body>
</html>
